<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Governance Intelligence Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
/* ── RESET & BASE ─────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:       #0a0a0f;
  --ink2:      #1a1a2e;
  --surface:   #f0efe8;
  --panel:     #faf9f3;
  --border:    #e2e0d4;
  --accent:    #e8461a;
  --accent2:   #1a46e8;
  --gold:      #c9a84c;
  --ok:        #1a8c4e;
  --warn:      #d97706;
  --crit:      #dc2626;
  --high:      #e85c1a;
  --med:       #d97706;
  --low:       #1a8c4e;
  --mono:      'DM Mono', monospace;
  --head:      'Arial', sans-serif;
  --body:      'Instrument Sans', sans-serif;
  --r:         4px;
  --r2:        8px;
  --shadow:    0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
}

html{scroll-behavior:smooth}
body{
  background:var(--surface);
  color:var(--ink);
  font-family:var(--body);
  font-size:14px;
  line-height:1.6;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── LAYOUT ──────────────────────────────────────────────────────────────── */
.app{display:grid;grid-template-rows:auto 1fr;min-height:100vh}

/* ── HEADER ──────────────────────────────────────────────────────────────── */
header{
  background:var(--ink);
  color:#fff;
  padding:0 40px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  height:64px;
  position:sticky;top:0;z-index:100;
  border-bottom:2px solid var(--accent);
}
.logo{
  font-family:var(--head);
  font-weight:800;
  font-size:17px;
  letter-spacing:-.3px;
  display:flex;align-items:center;gap:10px;
}
.logo-mark{
  width:28px;height:28px;
  background:var(--accent);
  border-radius:3px;
  display:grid;place-items:center;
}
.logo-mark svg{width:16px;height:16px;fill:#fff}
.header-meta{
  display:flex;align-items:center;gap:24px;
  font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.5);
}
.header-badge{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  padding:4px 10px;border-radius:3px;
  font-size:11px;color:rgba(255,255,255,.7);
}
.header-badge.live{border-color:var(--ok);color:#5de68a}
.exec-id{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.35)}

/* ── MAIN GRID ───────────────────────────────────────────────────────────── */
main{padding:32px 40px 64px;max-width:1440px;margin:0 auto;width:100%}

/* ── SECTION HEADERS ─────────────────────────────────────────────────────── */
.section-label{
  font-family:var(--mono);font-size:10px;letter-spacing:2px;
  text-transform:uppercase;color:rgb(0, 0, 0); 
  margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── HERO ROW ────────────────────────────────────────────────────────────── */
.hero-row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr 320px;
  gap:16px;
  margin-bottom:32px;
}

/* ── KPI CARD ────────────────────────────────────────────────────────────── */
.kpi{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:var(--r2);
  padding:24px;
  position:relative;
  overflow:hidden;
  box-shadow:var(--shadow);
  animation:fadeUp .4s ease both;
}
.kpi::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:3px;
  background:var(--accent);
}
.kpi.ok::before{background:var(--ok)}
.kpi.warn::before{background:var(--warn)}
.kpi.crit::before{background:var(--crit)}
.kpi.accent2::before{background:var(--accent2)}

.kpi-label{
  font-family:var(--mono);font-size:10px;letter-spacing:1.5px;
  text-transform:uppercase;color:rgb(49, 49, 49);margin-bottom:10px;
}
.kpi-value{
  font-family:var(--head);font-size:36px;font-weight:800;
  line-height:1;color:var(--ink);
}
.kpi-value sup{font-size:18px;vertical-align:top;margin-top:4px;color:rgba(0,0,0,.4)}
.kpi-sub{margin-top:8px;font-size:12px;color:rgba(0,0,0,.45)}
.kpi-sub strong{color:var(--ink);font-weight:600}

/* ── RISK GAUGE ──────────────────────────────────────────────────────────── */
.risk-card{
  background:var(--ink2);
  border-radius:var(--r2);
  padding:24px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#fff;
  box-shadow:var(--shadow);
  animation:fadeUp .4s .1s ease both;
}
.risk-label{
  font-family:var(--mono);font-size:10px;letter-spacing:1.5px;
  text-transform:uppercase;color:rgba(255,255,255,.4);
  margin-bottom:16px;
}
.gauge-wrap{position:relative;width:140px;height:75px;margin:0 auto 16px}
.gauge-wrap svg{width:140px;height:75px;overflow:visible}
.gauge-track{fill:none;stroke:rgba(255,255,255,.08);stroke-width:14;stroke-linecap:round}
.gauge-fill{fill:none;stroke-width:14;stroke-linecap:round;transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1)}
.gauge-score{
  position:absolute;
  bottom:-4px;left:50%;transform:translateX(-50%);
  font-family:var(--head);font-size:32px;font-weight:800;color:#fff;
  line-height:1;
}
.gauge-max{font-size:13px;color:rgba(255,255,255,.4)}
.risk-desc{font-size:12px;color:rgba(255,255,255,.5);text-align:center}

/* ── CONTENT GRID ────────────────────────────────────────────────────────── */
.content-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  margin-bottom:32px;
}
.content-grid.three{grid-template-columns:1fr 1fr 1fr}
.content-grid.one{grid-template-columns:1fr}

/* ── PANEL ───────────────────────────────────────────────────────────────── */
.panel{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:var(--r2);
  padding:24px;
  box-shadow:var(--shadow);
  animation:fadeUp .4s ease both;
}
.panel-title{
  font-family:var(--head);font-size:15px;font-weight:700;
  margin-bottom:20px;display:flex;align-items:center;gap:8px;
}
.panel-title .dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--accent);flex-shrink:0;
}
.panel-title .dot.ok{background:var(--ok)}
.panel-title .dot.warn{background:var(--warn)}
.panel-title .dot.crit{background:var(--crit)}
.panel-title .dot.accent2{background:var(--accent2)}
.panel-title .dot.gold{background:var(--gold)}

/* ── BAR CHART ───────────────────────────────────────────────────────────── */
.bar-chart{display:flex;flex-direction:column;gap:10px}
.bar-row{display:grid;grid-template-columns:100px 1fr 70px;align-items:center;gap:12px}
.bar-name{font-size:12px;color:rgba(0,0,0,.6);text-align:right;font-family:var(--mono)}
.bar-track{height:8px;background:rgba(0,0,0,.06);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.bar-fill.aws{background:linear-gradient(90deg,#e8521a,#e8821a)}
.bar-fill.gcp{background:linear-gradient(90deg,#1a46e8,#1a86e8)}
.bar-fill.azure{background:linear-gradient(90deg,#1a8ce8,#1ae8d4)}
.bar-fill.compute{background:linear-gradient(90deg,#8b1ae8,#c41ae8)}
.bar-fill.storage{background:linear-gradient(90deg,#e8461a,#e8961a)}
.bar-fill.database{background:linear-gradient(90deg,#1a8c4e,#1ae87a)}
.bar-val{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--ink)}

/* ── DONUT ───────────────────────────────────────────────────────────────── */
.donut-wrap{display:flex;align-items:center;gap:24px}
.donut-svg{flex-shrink:0}
.donut-legend{display:flex;flex-direction:column;gap:8px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.legend-label{color:rgba(0,0,0,.6)}
.legend-val{font-family:var(--mono);font-weight:500;margin-left:auto}

/* ── FINDINGS TABLE ──────────────────────────────────────────────────────── */
.findings{display:flex;flex-direction:column;gap:8px}
.finding{
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:12px 14px;
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;gap:12px;
  transition:border-color .15s,background .15s;
  cursor:default;
}
.finding:hover{border-color:rgba(0,0,0,.2);background:#fff}
.risk-badge{
  font-family:var(--mono);font-size:10px;font-weight:500;
  padding:3px 8px;border-radius:3px;letter-spacing:.5px;text-transform:uppercase;
  white-space:nowrap;
}
.risk-badge.critical{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5}
.risk-badge.high{background:#ffedd5;color:#c2410c;border:1px solid #fed7aa}
.risk-badge.medium{background:#fef3c7;color:#b45309;border:1px solid #fde68a}
.risk-badge.low{background:#dcfce7;color:#166534;border:1px solid #a7f3d0}

.finding-id{
  font-family:var(--mono);font-size:11px;color:var(--ink);
  font-weight:500;
}
.finding-issues{font-size:11px;color:rgba(0,0,0,.45);margin-top:2px}
.finding-pii{
  font-family:var(--mono);font-size:10px;
  background:rgba(220,38,38,.08);
  color:#dc2626;padding:2px 6px;border-radius:2px;
  white-space:nowrap;
}

/* ── COMPLIANCE SCORE ────────────────────────────────────────────────────── */
.compliance-score-wrap{text-align:center;padding:8px 0 16px}
.score-ring{margin:0 auto 12px}
.score-num{
  font-family:var(--head);font-size:52px;font-weight:800;
  color:var(--ink);line-height:1;
}
.score-denom{font-family:var(--mono);font-size:16px;color:rgba(0,0,0,.3)}
.score-label{font-size:12px;color:rgba(0,0,0,.45);margin-top:4px}
.risk-pills{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:16px}
.pill{
  padding:5px 12px;border-radius:3px;
  font-family:var(--mono);font-size:11px;font-weight:500;
  display:flex;align-items:center;gap:5px;
}
.pill.crit{background:#fee2e2;color:#dc2626}
.pill.high{background:#ffedd5;color:#c2410c}
.pill.med{background:#fef3c7;color:#b45309}
.pill.low2{background:#dcfce7;color:#166534}
.pill-count{font-size:16px;font-weight:700}

/* ── CULTURE ─────────────────────────────────────────────────────────────── */
.maturity-bar-wrap{margin-bottom:20px}
.maturity-track{
  height:12px;background:rgba(0,0,0,.06);
  border-radius:6px;overflow:hidden;margin:8px 0 4px;
}
.maturity-fill{
  height:100%;border-radius:6px;
  background:linear-gradient(90deg,var(--gold),#e8961a);
  transition:width .8s cubic-bezier(.4,0,.2,1);
}
.maturity-labels{
  display:flex;justify-content:space-between;
  font-family:var(--mono);font-size:10px;color:rgba(0,0,0,.35);
}
.aspect-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.aspect{background:rgba(0,0,0,.03);border-radius:var(--r);padding:10px 12px}
.aspect-name{font-size:11px;color:rgba(0,0,0,.5);margin-bottom:6px;text-transform:capitalize}
.aspect-dots{display:flex;gap:3px}
.aspect-dot{width:8px;height:8px;border-radius:2px;background:rgba(0,0,0,.08)}
.aspect-dot.on{background:var(--gold)}
.tags-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.tag{
  padding:4px 10px;background:rgba(0,0,0,.05);
  border-radius:3px;font-size:11px;color:rgba(0,0,0,.6);
}
.tag.bottleneck{background:rgba(232,70,26,.08);color:var(--accent)}
.tag.strength{background:rgba(26,140,78,.08);color:var(--ok)}

/* ── CORRELATIONS ────────────────────────────────────────────────────────── */
.correlations{display:flex;flex-direction:column;gap:12px}
.correlation{
  border-left:3px solid;
  padding:12px 16px;
  border-radius:0 var(--r) var(--r) 0;
  background:rgba(0,0,0,.02);
}
.correlation.critical{border-color:var(--crit);background:rgba(220,38,38,.04)}
.correlation.high{border-color:var(--high);background:rgba(232,92,26,.04)}
.correlation.medium{border-color:var(--med);background:rgba(217,119,6,.04)}
.correlation-title{font-weight:600;font-size:13px;margin-bottom:4px}
.correlation-ev{font-size:12px;color:rgba(0,0,0,.5)}
.domains-row{display:flex;gap:4px;margin-top:8px}
.domain-chip{
  font-family:var(--mono);font-size:10px;
  padding:2px 7px;border-radius:2px;
  background:rgba(0,0,0,.06);color:rgba(0,0,0,.5);
  text-transform:uppercase;letter-spacing:.5px;
}

/* ── ACTIONS ─────────────────────────────────────────────────────────────── */
.actions{display:flex;flex-direction:column;gap:8px}
.action{
  display:grid;grid-template-columns:auto 1fr;gap:12px;
  align-items:start;padding:12px;
  border:1px solid var(--border);border-radius:var(--r);
  transition:background .15s;
}
.action:hover{background:#fff}
.action-num{
  font-family:var(--head);font-weight:800;font-size:18px;
  color:rgba(0,0,0,.12);line-height:1.2;
}
.action-text{font-size:12px;line-height:1.5;color:rgba(0,0,0,.65)}
.action-text strong{color:var(--ink);font-weight:600}

/* ── EXECUTIVE SUMMARY ───────────────────────────────────────────────────── */
.summary-box{
  background:var(--ink);color:#fff;
  border-radius:var(--r2);padding:32px;
  font-size:14px;line-height:1.8;
  position:relative;overflow:hidden;
}
.summary-box::before{
  content:'"';
  position:absolute;top:-20px;left:24px;
  font-family:var(--head);font-size:140px;font-weight:800;
  color:rgba(255,255,255,.04);line-height:1;pointer-events:none;
}
.summary-text{position:relative;z-index:1;color:rgba(255,255,255,.8)}
.summary-meta{
  margin-top:20px;padding-top:16px;
  border-top:1px solid rgba(255,255,255,.08);
  display:flex;gap:24px;flex-wrap:wrap;
}
.smeta{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.3)}
.smeta strong{color:rgba(255,255,255,.6)}

/* ── IDLE RESOURCES ──────────────────────────────────────────────────────── */
.idle-list{display:flex;flex-direction:column;gap:8px}
.idle-item{
  display:grid;grid-template-columns:1fr auto auto;
  align-items:center;gap:12px;
  padding:10px 12px;
  border:1px solid var(--border);border-radius:var(--r);
}
.idle-id{font-family:var(--mono);font-size:12px;font-weight:500}
.idle-provider{
  font-family:var(--mono);font-size:10px;text-transform:uppercase;
  padding:2px 7px;border-radius:2px;background:rgba(0,0,0,.06);color:rgba(0,0,0,.5);
}
.idle-cost{
  font-family:var(--head);font-size:15px;font-weight:700;
  color:var(--crit);
}

/* ── LOADING / ERROR ─────────────────────────────────────────────────────── */
.loading{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:60vh;gap:16px;color:rgba(0,0,0,.35);
}
.spinner{
  width:36px;height:36px;border-radius:50%;
  border:3px solid rgba(0,0,0,.08);
  border-top-color:var(--accent);
  animation:spin .7s linear infinite;
}

/* ── ANIMATIONS ──────────────────────────────────────────────────────────── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── RESPONSIVE ──────────────────────────────────────────────────────────── */
@media(max-width:1100px){
  .hero-row{grid-template-columns:1fr 1fr;}.risk-card{grid-column:1/-1}
  .content-grid.three{grid-template-columns:1fr 1fr}
}
@media(max-width:700px){
  main{padding:20px 16px 48px}
  header{padding:0 16px}
  .hero-row,.content-grid,.content-grid.three{grid-template-columns:1fr}
  .bar-row{grid-template-columns:80px 1fr 60px}
}
</style>
</head>

// ── FORMATTERS ─────────────────────────────────────────────────────────────
const fmt$ = v => '$' + v.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
const fmtN = v => v.toLocaleString('pt-BR');
const escHtml = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function riskColor(lvl) {
  return {critical:'var(--crit)',high:'var(--high)',medium:'var(--med)',low:'var(--low)'}[lvl] || '#666';
}

// ── GAUGE SVG ──────────────────────────────────────────────────────────────
function buildGauge(score, max=10) {
  const R = 54, cx=70, cy=68;
  const circumference = Math.PI * R; // half circle
  const pct = Math.min(score / max, 1);
  const dash = pct * circumference;
  const color = score >= 7 ? '#ef4444' : score >= 5 ? '#f97316' : score >= 3 ? '#eab308' : '#22c55e';
  return `
  <svg class="gauge-svg" viewBox="0 0 140 75" width="140" height="75">
    <path class="gauge-track" d="M16,68 A54,54 0 0,1 124,68" stroke="rgba(255,255,255,.1)" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path class="gauge-fill" d="M16,68 A54,54 0 0,1 124,68"
      stroke="${color}" stroke-width="12" fill="none" stroke-linecap="round"
      stroke-dasharray="${dash} ${circumference}"
      style="transition:stroke-dasharray .9s cubic-bezier(.4,0,.2,1)"/>
  </svg>`;
}

// ── DONUT SVG ──────────────────────────────────────────────────────────────
function buildDonut(data, colors) {
  const R=50, cx=60, cy=60, total=Object.values(data).reduce((a,b)=>a+b,0);
  if(!total) return '';
  let startAngle=-Math.PI/2, paths='';
  const entries = Object.entries(data);
  entries.forEach(([k,v],i)=>{
    const angle=(v/total)*2*Math.PI;
    const x1=cx+R*Math.cos(startAngle), y1=cy+R*Math.sin(startAngle);
    const x2=cx+R*Math.cos(startAngle+angle), y2=cy+R*Math.sin(startAngle+angle);
    const lg=angle>Math.PI?1:0;
    paths+=`<path d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${R},${R} 0 ${lg},1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${colors[i%colors.length]}"/>`;
    startAngle+=angle;
  });
  return `<svg viewBox="0 0 120 120" width="110" height="110">
    <circle cx="60" cy="60" r="50" fill="none"/>
    ${paths}
    <circle cx="60" cy="60" r="28" fill="var(--panel)"/>
  </svg>`;
}

// ── SCORE RING ──────────────────────────────────────────────────────────────
function buildScoreRing(score, max=100) {
  const R=44, cx=50, cy=50, circ=2*Math.PI*R;
  const pct=score/max, dash=pct*circ;
  const color=score>=70?'var(--ok)':score>=50?'var(--warn)':'var(--crit)';
  return `<svg width="100" height="100" viewBox="0 0 100 100" class="score-ring">
    <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="rgba(0,0,0,.06)" stroke-width="8"/>
    <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${color}" stroke-width="8"
      stroke-linecap="round" stroke-dasharray="${dash.toFixed(2)} ${circ.toFixed(2)}"
      transform="rotate(-90 ${cx} ${cy})"
      style="transition:stroke-dasharray .9s cubic-bezier(.4,0,.2,1)"/>
  </svg>`;
}
